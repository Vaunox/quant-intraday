# Phase 3X — Cross-Sectional Multi-Factor Equity Strategy (Nifty 500, Monthly)
#
# THE PRE-COMMITTED CONTRACT. Per Inviolable Rule 1, the kill-gate thresholds and the
# decision budget in this file are fixed BEFORE any candidate is run. They tighten, never
# loosen. This file is locked before the first factor commit (operator instruction).
#
# Spec: docs/iteration_log/p3x_spec.md (the handoff document).
# Why this exists: docs/FINDINGS.md established the Phase-2R binding constraint (weak
# directional bar-data signal eaten by retail costs; three families at OOS AUC ~0.52). This
# strategy attacks it from the other Grinold-Kahn axes — frequency (monthly), alpha source
# (cross-sectional factors), and breadth (Nifty 500, sector-neutral) — IR = IC x sqrt(Breadth).
#
# Honest framing: this is a LONG-ONLY, BENCHMARK-RELATIVE product. The success metric is the
# active information ratio vs Nifty 500 TRI, NOT absolute Sharpe (a long-only book's absolute
# Sharpe is mostly market beta; skill lives in the active return). Published India factor IRs
# cluster 0.5-0.9; we pre-commit >= 0.75 as the bar.

strategy:
  name: cross_sectional_multifactor_nifty500
  product: cnc_long_only            # delivery, long-only (long-short via SSF is a §6 extension)
  benchmark: NIFTY500_TRI           # total-return index; all active metrics are vs this

universe:
  index: NIFTY500
  point_in_time: true               # survivorship-correct membership incl. names that left
  # Liquidity screen, applied point-in-time at each rebalance date (no look-ahead):
  min_median_adv_inr: 250000000.0   # >= Rs.25 cr median 60-day traded value (X; tune in P3X.1)
  min_history_sessions: 252         # >= 252 trading days of history at the rebalance date

rebalance:
  cadence: monthly                  # decision on last session of month m; enter next open
  cadence_toggle: [monthly, quarterly]  # also implement quarterly (lower turnover); test both
  hold_sessions: 21                 # ~1 month; the label horizon (drives purge/embargo)
  entry: next_session_open          # next-bar-open, same rule research and live

selection:
  rule: top_quintile                # top 20% by composite score
  variant: top_decile               # also test top-decile

weighting:
  method: inverse_vol               # inverse-vol first; graduate to HRP once book is wide enough
  graduate_to: hrp                  # only after HRP beats inverse-vol OOS
  sector_cap_pct: 25.0              # <= 25% of book per sector
  max_weight_per_name_pct: 5.0      # <= 5% per name
  no_trade_band_relative: 0.25      # only adjust a name when target weight moves > 25% relative
  vol_target: true                  # quarter-Kelly / vol-target scalar, capped

# --- Factor set (P3X.2 Phase A: price-only, buildable from existing data) -------------------
factors:
  momentum_12_1:
    enabled: true
    lookback_start_sessions: 252    # cumulative total return from t-252 ...
    skip_recent_sessions: 21        # ... to t-21 (skip most recent month)
  short_term_reversal:
    enabled: true
    window_sessions: 21             # -1 x return over t-21..t (contrarian)
  low_volatility:
    enabled: true
    window_sessions: 252            # -1 x trailing realized vol (rank low-vol high)
    beta_variant: true              # also a market-beta variant
  residual_momentum:
    enabled: true
    lookback_start_sessions: 252    # 12-1 momentum on rolling market-model residuals
    skip_recent_sessions: 21
    market_model_window_sessions: 252
  amihud_illiquidity:
    enabled: true
    window_sessions: 252            # rolling |return| / traded-value, point-in-time
  # Phase B (DEFERRED, data-gated): value (earnings yield, B/P), quality (ROE, accruals,
  # leverage, earnings stability) — require a POINT-IN-TIME fundamentals feed the Kite
  # pipeline does not have. Do NOT build from price; wire a PIT fundamentals source first.

combination:
  scoring: sector_neutral_zscore    # z-score each factor within sector, at each rebalance date
  baseline: equal_weight_composite  # zero free parameters — the candidate that must clear first
  enhancement: ml_ensemble          # LGBM/XGB/logistic to predict P3X.3 rank — TRIAL-CHARGED
  # P3X.4b A/B variant — K-Means cluster-selection combiner. k and the ex-ante thesis direction
  # are PRE-COMMITTED here BEFORE any gate run (Inviolable Rule 1), fixed by economic reasoning,
  # NOT tuned to the sample. Sweeping k or the weights is a multiple-testing search that increments
  # the honest DSR trial count N and reintroduces the selection bias this module removes — pick
  # once, live with it (no grid search).
  cluster_selection:
    k: 5                            # clusters; 4-6 reasonable for a monthly Nifty-500 cross-section
    random_state: 7                 # seeded K-Means — reproducible CPCV paths
    n_init: 10                      # K-Means restarts (stability); fixed, not tuned
    # The ideal-profile direction w: equal weight on the three IC-positive factors (momentum,
    # low-vol, residual-momentum — the cycle-1 finding). Reversal/Amihud are excluded (sign-
    # ambiguous / no illiquidity premium in a liquid top-500), so they carry implicit weight 0.
    thesis_weights:
      momentum: 1.0
      low_vol: 1.0
      residual_mom: 1.0

costs:
  # CNC delivery round-trip (P3X.6) — NOT the MIS intraday model. Matches a current discount-
  # broker delivery calculator; honest ~0.22% round trip:
  #   STT 0.10% x 2 legs = 0.200% | stamp 0.015% buy | exchange ~0.006% | SEBI+GST ~0.001%
  cnc_round_trip: 0.0022
  stt_delivery_rate: 0.001          # 0.10%, BOTH legs (vs MIS 0.025% sell-only)
  stamp_duty_buy_rate: 0.00015      # 0.015% buy side (delivery)

validation:
  # P3X.5 — purge/embargo MUST respect the 21-session label horizon; metrics on ACTIVE return.
  purge_embargo_sessions: 21        # >= one label horizon on the time axis
  cpcv_groups: 6
  cpcv_test_groups: 2
  metric_basis: active_vs_benchmark # path-Sharpe / DSR / PBO computed on active (vs TRI) return
  report_dedup_tstat: true          # report de-duplicated t-stat alongside path-concatenated DSR
  multiple_testing_hurdle_t: 3.0    # Harvey et al. — t >= 3 hurdle for a "discovery"

# --- THE KILL-GATE (benchmark-relative). Fixed before any run. Clear ALL SEVEN. --------------
kill_gate:
  active_ir_min: 0.75               # (1) CPCV median active IR vs Nifty 500 TRI (net, annualised)
  dsr_min: 0.95                     # (2) Deflated Sharpe Ratio on active return (honest N)
  pbo_max: 0.2                      # (3) Probability of Backtest Overfitting
  max_fraction_negative_paths: 0.05 # (4) fraction of negative active paths
  min_active_path_ir: -0.3          # (4) worst active path-IR floor
  all_paths_net_active_positive: true  # (5) net active return after CNC costs > 0, EVERY path
  survives_robustness_battery: true # (6) param sensitivity, MC shuffle, noise, leave-one-sector-out, synthetic
  max_sector_weight_pct: 25.0       # (7) diversification: max sector weight
  max_single_factor_active_share: 0.6  # (7) no single factor explains > 60% of active return

# --- Decision budget (P3X.5/P3X.8). Pre-committed, in writing, before P3X.8. -----------------
budget:
  baseline_config_cap: 6            # at most 6 configs on the zero-parameter baseline
  escalate_to_phase_b_if_baseline_ir_below: 0.4   # < 0.4 best active IR -> Phase B (fundamentals)
  stop_if_below: 0.4                # clean stop unless a fundamentals feed is then wired
  no_weight_data_mining: true       # do NOT tune factor weights to hit the bar (honest-N DSR punishes it)
  honest_trial_count: true          # every factor weight, universe cut, and ML config counts toward N
