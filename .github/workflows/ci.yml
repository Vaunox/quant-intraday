# CI: lint + type-check + tests on every push and pull request.
# Mirrors the local quality gates exactly (same tools, same pinned versions via
# uv.lock), so "green locally" and "green in CI" mean the same thing.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type-check + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (locked, reproducible)
        run: uv sync --frozen

      - name: Ruff (lint + import order)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: Mypy (strict type-check)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
